name: Blog Auto (affiliate posts)

on:
  schedule:
    # Mon / Wed / Fri at 13:00 UTC (~9am Miami)
    - cron: "0 13 * * 1,3,5"
  workflow_dispatch: {} # manual run for testing

permissions:
  contents: write

concurrency:
  group: blog-auto
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate post (EN + PT + ES)
        id: generate
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Commit new post
        if: steps.generate.outcome == 'success'
        run: |
          git config user.name "Victor Melo Bot"
          git config user.email "info@victormelo.app"
          git add content/posts
          git commit -m "feat(blog): ${{ steps.generate.outputs.slug }} (auto)"
          git push

      - name: Build (static export)
        if: steps.generate.outcome == 'success'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.generate.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy out --project-name=victormelo-app --branch=main --commit-dirty=true

      - name: Ping IndexNow (Bing / Yandex)
        if: steps.generate.outcome == 'success'
        env:
          SLUG: ${{ steps.generate.outputs.slug }}
        run: |
          KEY="a7f3c9e21b8d4f06a5c1e9b240d7f8a3"
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"victormelo.app\",\"key\":\"$KEY\",\"keyLocation\":\"https://victormelo.app/$KEY.txt\",\"urlList\":[\"https://victormelo.app/blog/$SLUG\",\"https://victormelo.app/pt/blog/$SLUG\",\"https://victormelo.app/es/blog/$SLUG\"]}" \
            && echo "IndexNow pinged for $SLUG" || echo "IndexNow ping failed (non-fatal)"

      - name: No new post — skipped
        if: steps.generate.outcome != 'success'
        run: echo "No new post generated this run (queue exhausted or slug collision). Nothing deployed."
